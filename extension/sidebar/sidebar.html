<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PBS Copilot</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div id="header-title">PBS Copilot</div>
    <div id="header-meta" class="muted">Not connected</div>
    <button id="btn-settings" title="Settings">⚙</button>
  </div>

  <!-- Not connected state -->
  <div id="state-disconnected" class="state-panel">
    <p>Open NavBlue PBS and log in to get started.</p>
  </div>

  <!-- Connected state -->
  <div id="state-connected" class="state-panel hidden">

    <!-- Constants section -->
    <div class="section" id="section-constants">
      <div class="section-header" data-toggle="constants">
        <span>⚙ Constants</span>
        <span class="section-toggle">▾</span>
      </div>
      <div class="section-body" id="constants-body">
        <div id="constants-list"></div>
        <button class="btn-secondary" id="btn-edit-constants">Edit Constants</button>
      </div>
    </div>

    <!-- Bid Groups section -->
    <div class="section" id="section-groups">
      <div class="section-header">
        <span>📋 Bid Groups</span>
      </div>
      <div class="section-body">
        <div id="groups-list"></div>
        <button class="btn-secondary" id="btn-add-group">+ Add Bid Group</button>
      </div>
    </div>

    <!-- Pairings section -->
    <div class="section" id="section-pairings">
      <div class="section-header" data-toggle="pairings">
        <span>✈ Pairings</span>
        <span class="badge" id="pairings-count">—</span>
        <span class="section-toggle">▾</span>
      </div>
      <div class="section-body collapsed" id="pairings-body">
        <input id="pairing-search" type="text" placeholder="Filter by number, layover, length...">
        <div id="pairings-list"></div>
      </div>
    </div>

    <!-- AI Chat section -->
    <div class="section" id="section-chat">
      <div class="section-header">
        <span>💬 Build with AI</span>
      </div>
      <div class="section-body">
        <textarea id="chat-input" placeholder="Describe what you want this month...&#10;&#10;e.g. 3-4 day trips, no early shows, prefer SFO/LAX, need 18th-22nd off"></textarea>
        <button class="btn-primary" id="btn-build">Build Bid</button>
        <div id="chat-status" class="muted hidden"></div>
      </div>
    </div>

    <!-- Submit section -->
    <div class="section" id="section-submit">
      <div class="section-header">
        <span>🚀 Submit Bid</span>
      </div>
      <div class="section-body">
        <div id="bid-preview"></div>
        <input id="token-input" type="text" placeholder="Submission token (COPILOT-XXXX-XXXX)">
        <button class="btn-primary btn-submit" id="btn-submit">Submit Bid</button>
        <div id="submit-status" class="hidden"></div>
      </div>
    </div>

  </div>

  <!-- Settings panel -->
  <div id="panel-settings" class="overlay hidden">
    <div class="overlay-header">
      <span>Settings</span>
      <button id="btn-close-settings">✕</button>
    </div>
    <div class="overlay-body">
      <label>Claude API Key</label>
      <input id="setting-api-key" type="password" placeholder="sk-ant-...">
      <label>Validation Endpoint</label>
      <input id="setting-endpoint" type="text" placeholder="https://your-vercel-app.vercel.app">
      <button class="btn-primary" id="btn-save-settings">Save</button>
    </div>
  </div>

  <!-- Constants editor -->
  <div id="panel-constants" class="overlay hidden">
    <div class="overlay-header">
      <span>Constants — Always Applied</span>
      <button id="btn-close-constants">✕</button>
    </div>
    <div class="overlay-body">
      <label>Avoid employees (comma-separated IDs)</label>
      <input id="const-employees" type="text" placeholder="12345, 67890">

      <label>Avoid check-in before</label>
      <input id="const-checkin-before" type="time" value="06:00">

      <label>Min hours between trips</label>
      <input id="const-min-between" type="number" value="48" min="0" max="120">

      <label>Always avoid stations (comma-separated)</label>
      <input id="const-avoid-stations" type="text" placeholder="YVR, BUR, MRY">

      <label>Prefer off</label>
      <label class="checkbox-row">
        <input id="const-prefer-weekends" type="checkbox" checked> Weekends
      </label>

      <label>Max days on in a row</label>
      <input id="const-max-days-on" type="number" value="5" min="1" max="7">

      <button class="btn-primary" id="btn-save-constants">Save Constants</button>
    </div>
  </div>

  <!-- Bid group editor -->
  <div id="panel-group-editor" class="overlay hidden">
    <div class="overlay-header">
      <span id="group-editor-title">Bid Group</span>
      <button id="btn-close-group-editor">✕</button>
    </div>
    <div class="overlay-body">
      <label>Group name</label>
      <input id="group-name" type="text" placeholder="e.g. Ideal — SFO/LAX 4-day">

      <label>Avoid pairings (plain English)</label>
      <textarea id="group-avoids" placeholder="e.g. no 1 or 2-day trips, no check-ins before 7am"></textarea>

      <label>Award / prefer pairings (plain English)</label>
      <textarea id="group-awards" placeholder="e.g. SFO or LAX layovers, 4-day trips"></textarea>

      <label>Cherry-picked pairing numbers</label>
      <input id="group-specific" type="text" placeholder="G3027, G3043, G3068">

      <label class="checkbox-row">
        <input id="group-else-next" type="checkbox" checked>
        If can't complete → go to next group
      </label>

      <button class="btn-primary" id="btn-save-group">Save Group</button>
    </div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
