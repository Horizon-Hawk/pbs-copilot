<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div id="header-title">Copilot</div>
    <div id="header-meta" class="muted">Not connected</div>
  </div>

  <!-- Not connected state -->
  <div id="state-disconnected" class="state-panel">
    <p>Open NavBlue PBS and log in to get started.</p>
  </div>

  <!-- Connected state -->
  <div id="state-connected" class="state-panel hidden">

    <!-- Constants section -->
    <div class="section" id="section-constants">
      <div class="section-header" data-toggle="constants">
        <span>⚙ Credit Hours</span>
        <span class="section-toggle">▾</span>
      </div>
      <div class="section-body" id="constants-body">
        <div id="constants-list"></div>
        <button class="btn-secondary" id="btn-edit-constants">Edit Constants</button>
      </div>
    </div>

    <!-- Bid Groups section -->
    <div class="section" id="section-groups">
      <div class="section-header">
        <span>📋 Bid Groups</span>
      </div>
      <div class="section-body">
        <div id="groups-list"></div>
        <button class="btn-secondary" id="btn-add-group">+ Add Bid Group</button>
      </div>
    </div>

    <!-- Pairings section -->
    <div class="section" id="section-pairings">
      <div class="section-header" data-toggle="pairings">
        <span>✈ Pairings</span>
        <span class="badge" id="pairings-count">—</span>
        <span class="section-toggle">▾</span>
      </div>
      <div class="section-body" id="pairings-body">
        <div style="display:flex;gap:4px;margin-bottom:4px;">
          <input id="period-pairings" type="text" placeholder="Period e.g. JUL26" style="margin-top:0;flex:1;">
          <button class="btn-secondary" id="btn-load-period" style="margin-top:0;width:auto;padding:6px 10px;font-size:11px;">Load</button>
        </div>
        <input id="pairing-search" type="text" placeholder="Filter by number, layover, length...">
        <button class="btn-secondary" id="btn-copy-data" style="font-size:11px;margin-top:6px;">📋 Copy pairing data</button>
        <details style="margin-top:8px;">
          <summary style="font-size:11px;color:#64748b;cursor:pointer;">📥 Paste pairings XML (fallback)</summary>
          <textarea id="pairings-paste" placeholder="Paste raw NavBlue pairings XML here..." style="margin-top:6px;min-height:80px;font-size:11px;"></textarea>
          <button class="btn-secondary" id="btn-load-pasted" style="font-size:11px;margin-top:4px;">Load pasted XML</button>
        </details>
        <div id="pairings-list"></div>
      </div>
    </div>

    <!-- AI Chat section -->
    <div class="section" id="section-chat">
      <div class="section-header">
        <span>💬 Build with Copilot</span>
      </div>
      <div class="section-body">
        <textarea id="chat-input" placeholder="Describe what you want this month...&#10;&#10;e.g. 3-4 day trips, no early shows, prefer SFO/LAX, need 18th-22nd off"></textarea>
        <div style="display:flex;gap:6px;">
          <button class="btn-primary" id="btn-build" style="flex:1;">Build Bid</button>
          <button class="btn-secondary" id="btn-clear-bid" style="width:auto;padding:6px 12px;">✕ Clear</button>
        </div>
        <div id="chat-status" class="muted hidden"></div>
      </div>
    </div>

    <!-- Submit section -->
    <div class="section" id="section-submit">
      <div class="section-header">
        <span>🚀 Submit Bid</span>
      </div>
      <div class="section-body">
        <div id="bid-preview"></div>
        <input id="period-input" type="text" placeholder="Bid period (e.g. JUL26)">

        <div class="form-label" style="margin-top:8px;">Submit to</div>
        <div class="radio-row">
          <label><input type="radio" name="bid-target" value="current" checked> Current Bid (window open)</label>
          <label><input type="radio" name="bid-target" value="default"> Default Bid (always editable)</label>
        </div>

        <button class="btn-primary btn-submit" id="btn-submit">Submit Bid</button>
<div id="submit-status" class="hidden"></div>
      </div>
    </div>

  </div>

  <!-- Constants editor -->
  <div id="panel-constants" class="overlay hidden">
    <div class="overlay-header">
      <span>Credit Hours</span>
      <button id="btn-close-constants">✕</button>
    </div>
    <div class="overlay-body">
      <label for="const-pre-award-credit">Pre-award credit this period (hrs) — GL trips, training, etc.</label>
      <input id="const-pre-award-credit" type="number" value="0" min="0" max="90" step="0.5">

      <label for="const-min-credit">Min credit hours (CBA: 75)</label>
      <input id="const-min-credit" type="number" value="75" min="0" max="120">

      <label for="const-max-credit">Max credit hours (CBA: 90)</label>
      <input id="const-max-credit" type="number" value="90" min="0" max="120">

      <button class="btn-primary" id="btn-save-constants">Save</button>
    </div>
  </div>

  <!-- Bid group editor -->
  <div id="panel-group-editor" class="overlay hidden">
    <div class="overlay-header">
      <span id="group-editor-title">Bid Group</span>
      <button id="btn-close-group-editor">✕</button>
    </div>
    <div class="overlay-body">
      <label for="group-name">Group name</label>
      <input id="group-name" type="text" placeholder="e.g. Ideal — SFO/LAX 4-day">

      <label for="group-avoids">Avoid pairings (plain English)</label>
      <textarea id="group-avoids" placeholder="e.g. no 1 or 2-day trips, no check-ins before 7am"></textarea>

      <label for="group-awards">Award / prefer pairings (plain English)</label>
      <textarea id="group-awards" placeholder="e.g. SFO or LAX layovers, 4-day trips"></textarea>

      <label for="group-specific">Cherry-picked pairing numbers</label>
      <input id="group-specific" type="text" placeholder="G3027, G3043, G3068">

      <label class="checkbox-row">
        <input id="group-else-next" type="checkbox" checked>
        If can't complete → go to next group
      </label>

      <button class="btn-primary" id="btn-save-group">Save Group</button>
    </div>
  </div>

  <script type="module" src="sidebar.js"></script>
</body>
</html>
